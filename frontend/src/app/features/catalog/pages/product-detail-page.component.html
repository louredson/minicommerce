<div *ngIf="product" class="card p-3">
  <img
    [src]="imageSrc(product.image_url)"
    [attr.data-original-src]="product.image_url || ''"
    (error)="$any($event.target).src = $any($event.target).dataset?.originalSrc && $any($event.target).src !== $any($event.target).dataset?.originalSrc ? $any($event.target).dataset?.originalSrc : 'data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22600%22 height=%22400%22><rect width=%22100%25%22 height=%22100%25%22 fill=%22%23d9dde2%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23444%22 font-size=%2230%22>Sem Imagem</text></svg>'"
    [alt]="product.name"
    style="width:100%;max-height:380px;object-fit:cover;border-radius:10px"
    class="mb-3"
  />
  <h2>{{ product.name }}</h2>
  <p class="text-muted">Categoria: {{ product.category_name }}</p>
  <p>{{ product.description }}</p>
  <p><strong>Preco:</strong> Kz {{ product.price | number:'1.2-2' }}</p>
  <p><strong>Stock:</strong> {{ product.stock }}</p>

  <div class="d-flex gap-2 mt-3">
    <button class="btn btn-outline-dark" (click)="back()">Voltar</button>
    <button
      class="btn btn-warning"
      *ngIf="session.isLoggedIn && !session.isAdmin"
      [disabled]="(product.stock || 0) <= 0"
      (click)="buyNow()">
      Comprar
    </button>
  </div>
  <small class="text-muted mt-2" *ngIf="(product.stock || 0) <= 0">Produto sem stock no momento.</small>
</div>
