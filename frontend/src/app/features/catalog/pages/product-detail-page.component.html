<div *ngIf="product" class="card p-3">
  <img
    [src]="product.image_url"
    [alt]="product.name"
    style="width:100%;max-height:380px;object-fit:cover;border-radius:10px"
    class="mb-3"
  />
  <h2>{{ product.name }}</h2>
  <p class="text-muted">Categoria: {{ product.category_name }}</p>
  <p>{{ product.description }}</p>
  <p><strong>Preco:</strong> Kz {{ product.price | number:'1.2-2' }}</p>
  <p><strong>Stock:</strong> {{ product.stock }}</p>
</div>
