<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h3>Criar Conta</h3>
      <div class="mb-2"><input class="form-control" [(ngModel)]="first_name" placeholder="Nome" /></div>
      <div class="mb-2"><input class="form-control" [(ngModel)]="last_name" placeholder="Sobrenome" /></div>
      <div class="mb-2"><input class="form-control" [(ngModel)]="email" placeholder="Email" /></div>
      <div class="mb-2"><input type="password" class="form-control" [(ngModel)]="password" placeholder="Senha" /></div>
      <div class="mb-2"><input type="password" class="form-control" [(ngModel)]="confirm_password" placeholder="Confirmar Senha" /></div>
      <div class="d-flex gap-2">
        <button class="btn btn-warning" (click)="submit()">Criar Conta</button>
        <a class="btn btn-outline-dark" routerLink="/login">Voltar ao Login</a>
      </div>
    </div>
  </div>
</div>
