<div class="row justify-content-center form-page-row">
  <div class="col-md-5">
    <div class="card p-4 form-shell">
      <h3 class="brand-form-title">
        <span class="brand-cart-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="20" r="1"></circle><circle cx="18" cy="20" r="1"></circle><path d="M2 3h3l2.1 10.3a2 2 0 0 0 2 1.6h8.9a2 2 0 0 0 2-1.6L22 7H7"></path>
          </svg>
        </span>
        Buyprime
      </h3>
      <p class="text-muted mb-3 form-subtitle">Recuperar Senha</p>
      <div class="mb-2"><input class="form-control" [(ngModel)]="email" placeholder="Email" /></div>
      <div class="form-actions d-flex justify-content-center"><button class="btn btn-warning" (click)="submit()">Gerar Token</button></div>
      <div class="form-text mt-2" *ngIf="token">Token: {{ token }}</div>
      <div class="text-center"><a class="btn btn-link mt-2 p-0" routerLink="/reset-password">Ir para redefinir senha</a></div>
    </div>
  </div>
</div>
