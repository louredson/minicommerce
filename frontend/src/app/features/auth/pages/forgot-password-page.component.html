<div class="row justify-content-center"><div class="col-md-5"><div class="card p-4">
  <h3>Recuperar Senha</h3>
  <div class="mb-2"><input class="form-control" [(ngModel)]="email" placeholder="Email" /></div>
  <button class="btn btn-warning" (click)="submit()">Gerar Token</button>
  <div class="form-text mt-2" *ngIf="token">Token: {{ token }}</div>
  <a class="btn btn-link mt-2 p-0" routerLink="/reset-password">Ir para redefinir senha</a>
</div></div></div>
